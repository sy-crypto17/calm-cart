<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物決策萬用計算機</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }
        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
            animation: fadeIn 0.5s;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
        }
        .work-hours-box {
            display: none;
            background-color: #e8f8f5;
            border-left: 5px solid #1abc9c;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 0.95em;
            line-height: 1.6;
            animation: fadeIn 0.5s;
        }
        .work-hours-box strong {
            color: #e74c3c;
            font-size: 1.2em;
        }
        .bg-green { background-color: #d5f5e3; color: #27ae60; }
        .bg-red { background-color: #fadbd8; color: #c0392b; }
        .bg-yellow { background-color: #fcf3cf; color: #d4ac0d; }
        /* 新增：3分鐘決策指南專屬排版 */
        .fast-pass-container {
            text-align: left;
            padding: 5px;
        }
        .fast-pass-container h3 {
            color: #27ae60;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px dashed #a9dfbf;
            padding-bottom: 15px;
            font-size: 1.3em;
        }
        .fast-pass-container > p {
            font-size: 0.95em;
            color: #555;
            text-align: center;
            margin-bottom: 20px;
        }
        .decision-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .decision-list li {
            background: rgba(255, 255, 255, 0.7);
            border-left: 4px solid #2ecc71;
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            font-size: 0.9em;
            line-height: 1.6;
            color: #444;
        }
        .decision-list li strong {
            color: #2c3e50;
            display: block;
            margin-bottom: 5px;
            font-size: 1.1em;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }
        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🛒 購物決策計算機</h2>

    <div id="step1" class="step active">
        <div class="form-group">
            <label>1. 你的時薪 (台幣):</label>
            <input type="number" id="wage" placeholder="例如: 300">
        </div>
        <div class="form-group">
            <label>2. 商品價格 (台幣):</label>
            <input type="number" id="price" placeholder="例如: 850">
        </div>
        <div class="form-group">
            <label>3. 商品類型:</label>
            <select id="category">
                <option value="tool">工具 / 知識型 (書、課程)</option>
                <option value="entertainment">娛樂 / 情緒型 (周邊、訂閱)</option>
            </select>
        </div>
        <button onclick="processStep1()">下一步</button>
    </div>

    <div id="work-hours-display" class="work-hours-box"></div>

    <div id="step-tool" class="step">
        <h4 style="color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px;">J.I.T. 及時需求測試</h4>
        <p style="font-size: 0.85em; color: #7f8c8d;">只要有一題答案為「否」，即視為無效需求。</p>
        
        <div class="form-group">
            <label>1. 現狀耗損：我現在的生活或工作，已經遇到「沒有它就卡關或很不方便」的情況了嗎？</label>
            <div class="radio-group">
                <label><input type="radio" name="jit-q1" value="yes"> 會，損失具體可見</label>
                <label><input type="radio" name="jit-q1" value="no"> 否，其實也不會怎樣</label>
            </div>
        </div>

        <div class="form-group">
            <label>2. 時間驗證：未來的 30 天內，我能在行事曆上排定確切的使用時段嗎？</label>
            <div class="radio-group">
                <label><input type="radio" name="jit-q2" value="yes"> 能，已預留好時間</label>
                <label><input type="radio" name="jit-q2" value="no"> 否，等有空再說</label>
            </div>
        </div>

        <div class="form-group">
            <label>3. 微小改變：使用它之後，我能立刻在生活中做出哪一個「具體的小動作」嗎？</label>
            <div class="radio-group">
                <label><input type="radio" name="jit-q3" value="yes"> 能，我腦海中有具體的畫面</label>
                <label><input type="radio" name="jit-q3" value="no"> 否，只是感覺變強</label>
            </div>
        </div>

        <button onclick="processTool()">進行 J.I.T 驗證</button>
        <button style="background-color: #95a5a6;" onclick="resetForm()">重新開始</button>
    </div>

    <div id="step-entertainment" class="step">
        <h4 style="color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px;">快樂保質期測試</h4>
        <p style="font-size: 0.85em; color: #7f8c8d;">娛樂也是剛需，但我們要確保買到的是高品質的快樂。</p>

        <div class="form-group">
            <label>1. 成本量化：請預估你會使用/享受它的次數？ (或看幾個月)</label>
            <input type="number" id="usage-times" placeholder="例如: 10">
            <button onclick="calculateEntertainment()" style="margin-top: 10px; background-color: #f39c12;">先算單次成本</button>
            <p id="ent-cost-display" style="font-weight: bold; color: #d35400; margin-top: 15px; display: none; padding: 10px; background-color: #fdf2e9; border-radius: 6px;"></p>
        </div>

        <div id="ent-questions" style="display: none;">
            <div class="form-group">
                <label>2. 純粹動機：買下它完全是因為我自己真心喜歡，而不是為了跟風或向別人炫耀？</label>
                <div class="radio-group">
                    <label><input type="radio" name="ent-q1" value="yes"> 是，我真心熱愛</label>
                    <label><input type="radio" name="ent-q1" value="no"> 否，其實有點怕落伍</label>
                </div>
            </div>

            <div class="form-group">
                <label>3. 空間歸屬：家裡有確切的空間收納/展示它，且它不會變成未來的雜物嗎？</label>
                <div class="radio-group">
                    <label><input type="radio" name="ent-q2" value="yes"> 有位置，絕對會珍惜</label>
                    <label><input type="radio" name="ent-q2" value="no"> 否，買了可能積灰塵</label>
                </div>
            </div>

            <div class="form-group">
                <label>4. 無可取代：我無法用手邊已有的東西（或免費資源）獲得類似的快樂嗎？</label>
                <div class="radio-group">
                    <label><input type="radio" name="ent-q3" value="yes"> 無法取代，它很獨特</label>
                    <label><input type="radio" name="ent-q3" value="no"> 否，其實有其他替代方案</label>
                </div>
            </div>

            <button onclick="processEntertainment()">看診斷結果</button>
        </div>
        
        <button style="background-color: #95a5a6; margin-top: 10px;" onclick="resetForm()">重新開始</button>
    </div>

    <div id="result-step" class="step">
        <div id="result-content" class="result-box"></div>
        <button onclick="resetForm()">重新評估其他商品</button>
    </div>

</div>

<script>
    let userData = {};

    function processStep1() {
        userData.wage = parseInt(document.getElementById('wage').value);
        userData.price = parseInt(document.getElementById('price').value);
        userData.category = document.getElementById('category').value;

        if (!userData.wage || !userData.price) {
            alert('請輸入時薪與商品價格！');
            return;
        }

        // 1. 工時計算邏輯
        const workHours = (userData.price / userData.wage).toFixed(1);
        const workDays = (workHours / 8).toFixed(1); 
        
        // 2. 自動連動冷靜期邏輯：每 8 小時工時（1工作天） = 24 小時冷靜期，最低保障 24 小時
        // 運用 Math.ceil 無條件進位，確保就算只要工作 1.5 天，也會直接啟動 48 小時的冷靜期
        userData.cooldown = Math.max(24, Math.ceil(workHours / 8) * 24);
        
        let hoursMessage = `💡 <strong>生命能量換算</strong><br>這項商品售價 ${userData.price} 元。<br>依您的時薪計算，您需要連續工作 <strong>${workHours} 小時</strong> 才能買下它。`;
        
        // 顯示工作天數與系統自動派發的冷靜期
        if (workHours >= 8) {
            hoursMessage += `<br>（相當於您 <strong>${workDays} 個工作天</strong> 的辛苦勞動！）`;
        }
        
        hoursMessage += `<br><br>⏳ 系統已為此商品自動綁定 <strong>${userData.cooldown} 小時</strong> 的決策冷靜期。`;

        // 快篩線判斷
        if (userData.price <= userData.wage) {
            document.getElementById('work-hours-display').style.display = 'none';
            
            // 建立漂亮的小短文 HTML 結構
            const fastPassHTML = `
                <div class="fast-pass-container">
                    <h3>🎉 快篩通過：啟動 3 分鐘極速決策</h3>
                    <p>這項商品僅 <strong>${userData.price} 元</strong>，低於您的時薪。請停止邏輯分析，立刻套用以下直覺指南：</p>
                    <ul class="decision-list">
                        <li>
                            <strong>⏳ 第 1 分鐘：絕對心動測試</strong>
                            問自己：「我是超級想要，還是只覺得便宜？」若沒有非要不可的衝動，請立刻關閉網頁。
                        </li>
                        <li>
                            <strong>⏳ 第 2 分鐘：現實空間盤點</strong>
                            問自己：「買來後家裡有確切的空位放嗎？這個週末就會立刻拿出來用嗎？」若答案為否，請果斷放棄。
                        </li>
                        <li>
                            <strong>⏳ 第 3 分鐘：買錯免責權</strong>
                            若順利通過前兩關，請直接結帳！請把這筆花費當作「了解自己喜好」的低成本實驗，省下糾結的時間去享受生活。
                        </li>
                    </ul>
                </div>
            `;
            
            showResult(fastPassHTML, 'bg-green');
        } else {
            // 高於時薪，顯示提示並進入追問
            document.getElementById('work-hours-display').innerHTML = hoursMessage;
            document.getElementById('work-hours-display').style.display = 'block';
            
            document.getElementById('step1').classList.remove('active');
            if (userData.category === 'tool') {
                document.getElementById('step-tool').classList.add('active');
            } else {
                document.getElementById('step-entertainment').classList.add('active');
            }
        }
    }

    function processTool() {
        // 抓取三題的選擇結果
        const q1 = document.querySelector('input[name="jit-q1"]:checked');
        const q2 = document.querySelector('input[name="jit-q2"]:checked');
        const q3 = document.querySelector('input[name="jit-q3"]:checked');

        // 防呆：確保三題都已作答
        if (!q1 || !q2 || !q3) { 
            alert('請回答完所有的 J.I.T. 測試問題！'); 
            return; 
        }

        // 嚴格檢驗邏輯：必須三個都是 'yes' 才算通過
        if (q1.value === 'yes' && q2.value === 'yes' && q3.value === 'yes') {
            showResult(`【通過 J.I.T 測試：立刻購買】<br><br>這項商品能確實解決當下痛點，且你已具備執行時間與明確目標。這是一筆極佳的投資，請結帳並立刻開始排程使用！`, 'bg-green');
        } else {
            // 只要有一個 'no'，即判定為囤積或衝動
            showResult(`【踩煞車：發現無效需求】<br><br>這項購買屬於「預防性焦慮」或「知識囤積」。<br>請將商品放入願望清單，並嚴格執行系統設定的 <strong>${userData.cooldown} 小時冷靜期</strong>。允許自己現在還不需要它，把錢和時間留給當下更重要的事！`, 'bg-yellow');
        }
    }

    function calculateEntertainment() {
        userData.times = parseInt(document.getElementById('usage-times').value);
        if (!userData.times || userData.times <= 0) { alert('請輸入有效的使用次數！'); return; }
        
        // 計算單次成本
        const costPerUse = (userData.price / userData.times).toFixed(1);
        const display = document.getElementById('ent-cost-display');
        display.innerHTML = `💰 單次享受的成本為：<strong>${costPerUse} 元</strong><br><span style="font-size: 0.85em; color: #555; font-weight: normal;">請帶著這個金額，回答下方的快樂測試：</span>`;
        display.style.display = 'block';

        // 顯示後續的三題靈魂拷問
        document.getElementById('ent-questions').style.display = 'block';
    }

    function processEntertainment() {
        // 抓取三題的選擇結果
        const q1 = document.querySelector('input[name="ent-q1"]:checked');
        const q2 = document.querySelector('input[name="ent-q2"]:checked');
        const q3 = document.querySelector('input[name="ent-q3"]:checked');

        if (!q1 || !q2 || !q3) { 
            alert('請誠實回答完所有的快樂測試問題唷！'); 
            return; 
        }
        // 必須三題都是 yes 才能過關
        if (q1.value === 'yes' && q2.value === 'yes' && q3.value === 'yes') {
            showResult(`【完美過關：購買高品質快樂】<br><br>情緒價值也是價值！既然單次成本你覺得划算，就買下來好好享受它帶來的快樂吧！`, 'bg-green');
        } else {
            showResult(`【踩煞車：發現衝動幻覺】<br><br>這筆消費可能混雜了「跟風、無處安放或可被替代」的因素。<br>請將它放入願望清單，並啟動 <strong>${userData.cooldown} 小時冷靜期</strong>。請把生命能量投資在能帶來長久喜悅的事物上！`, 'bg-yellow');
        }
    }

    function showResult(text, colorClass) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('work-hours-display').style.display = 'none';
        
        const resultStep = document.getElementById('result-step');
        const resultContent = document.getElementById('result-content');
        
        resultContent.className = 'result-box ' + colorClass;
        resultContent.innerHTML = text;
        resultStep.classList.add('active');
    }

    function resetForm() {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('work-hours-display').style.display = 'none';
        document.getElementById('step1').classList.add('active');
        document.getElementById('ent-eval').style.display = 'none';
        
        document.getElementById('wage').value = userData.wage || ''; 
        document.getElementById('price').value = '';
        document.getElementById('usage-times').value = '';
        
        document.querySelectorAll('input[type="radio"]').forEach(radio => radio.checked = false);
    }
</script>

</body>
</html>
